<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Folio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --border-color: #e4e4e7;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: 8vh;
            padding-bottom: 4vh;
        }

        * {
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 2rem;
        }

        h1 {
            margin: 0 0 8px;
            font-weight: 700;
            font-size: 2rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin: 0 0 32px;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--text-primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .error {
            color: #b91c1c;
            background: #fef2f2;
            padding: 12px;
            border: 1px solid #fee2e2;
            margin-bottom: 24px;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .links {
            margin-top: 32px;
            font-size: 0.95rem;
            text-align: center;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .divider {
            margin: 24px 0;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            line-height: 0.1em;
        }

        .divider span {
            background: var(--bg-color);
            padding: 0 12px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .btn-google {
            display: block;
            width: 100%;
            text-align: center;
            text-decoration: none;
            color: var(--text-primary);
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-weight: 600;
            background: var(--bg-color);
            transition: background 0.2s;
            font-size: 1.05rem;
        }

        .btn-google:hover {
            background: #fafafa;
        }

        .flex-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .flex-row>div {
            flex: 1;
            margin-bottom: 0;
        }

        @media(max-width: 400px) {
            .flex-row {
                flex-direction: column;
                gap: 24px;
                margin-bottom: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Start managing your library today</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/auth/register" method="POST">
            <div class="flex-row">
                <div class="form-group">
                    <label for="firstname">First name</label>
                    <input type="text" id="firstname" name="firstname" required>
                </div>
                <div class="form-group">
                    <label for="lastname">Last name</label>
                    <input type="text" id="lastname" name="lastname" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary">Create account</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <a href="/auth/google" class="btn-google">Sign up with Google</a>

        <div class="links">
            <div>Already have an account? <a href="/login">Log in</a></div>
            <div style="margin-top:12px;"><a href="/" style="font-weight:400; color:var(--text-secondary);">&larr; Back
                    to App</a></div>
        </div>
    </div>
</body>

</html>
