<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Open Bookie</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.5;
            margin: 2rem;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #ccc;
            padding: 2rem;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            cursor: pointer;
            background: #eee;
            border: 1px solid #ccc;
            font-weight: bold;
        }

        button:hover {
            background: #ddd;
        }

        .error {
            color: #721c24;
            background: #f8d7da;
            padding: 0.75rem;
            border: 1px solid #f5c6cb;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        .links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }

        .divider {
            margin: 1.5rem 0;
            text-align: center;
            border-bottom: 1px solid #eee;
            line-height: 0.1em;
        }

        .divider span {
            background: #fff;
            padding: 0 10px;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Login</h1>
        <p>Log in to your account</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/auth/login" method="POST">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Sign in</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <a href="/auth/google"
            style="display: block; text-align: center; text-decoration: none; color: #333; padding: 0.5rem; border: 1px solid #ccc;">Login
            with Google</a>

        <div class="links">
            <p><a href="/forgot-password">Forgot password?</a></p>
            <p>Don't have an account? <a href="/register">Sign up</a></p>
        </div>
    </div>
</body>

</html>
