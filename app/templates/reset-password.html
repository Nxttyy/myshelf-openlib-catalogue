<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password - Open Bookie</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.5;
            margin: 2rem;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #ccc;
            padding: 2rem;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            cursor: pointer;
            background: #eee;
            border: 1px solid #ccc;
            font-weight: bold;
        }

        button:hover {
            background: #ddd;
        }

        .error {
            color: #721c24;
            background: #f8d7da;
            padding: 0.75rem;
            border: 1px solid #f5c6cb;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Set New Password</h1>
        <p>Please enter your new password</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/auth/reset-password" method="POST">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="new_password" required>
            </div>
            <button type="submit">Reset password</button>
        </form>
    </div>
</body>

</html>
