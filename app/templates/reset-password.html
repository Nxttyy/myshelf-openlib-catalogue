<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — Folio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink-blue-deep:#1B2230;--paper:#F4EEE2;--paper-2:#ECE4D3;--ink:#1A1714;--ink-soft:#4A443B;--ink-faint:#8C8473;--hair-strong:rgba(26,23,20,0.28);--amber:#E0A23E;--amber-fg:#231A0E;--font-sans:'Inter Tight',-apple-system,system-ui,sans-serif;--font-mono:'JetBrains Mono','SF Mono',Menlo,monospace;--ease-out:cubic-bezier(0.2,0,0,1)}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{width:100%;max-width:380px}
.logo{display:flex;align-items:center;gap:8px;font-weight:600;font-size:16px;letter-spacing:-0.02em;text-decoration:none;color:var(--ink);margin-bottom:36px}
.logo-mark{width:24px;height:24px;border-radius:4px;background:var(--ink);color:var(--paper);display:grid;place-items:center}
.card-title{font-size:22px;font-weight:600;letter-spacing:-0.03em;margin:0 0 8px}
.card-sub{font-size:13.5px;color:var(--ink-soft);margin:0 0 28px;line-height:1.5}
.f-field{margin-bottom:14px}
.f-label{font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-bottom:6px}
.f-input{width:100%;font-family:var(--font-sans);font-size:14px;color:var(--ink);background:var(--paper-2);border:1px solid var(--hair-strong);border-radius:9px;padding:12px 14px;transition:border-color 120ms,box-shadow 120ms}
.f-input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(224,162,62,0.18)}
.f-input::placeholder{color:var(--ink-faint)}
.pw-wrap{position:relative}
.pw-wrap .f-input{padding-right:44px}
.pw-toggle{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;background:transparent;cursor:pointer;color:var(--ink-faint);display:grid;place-items:center;border-radius:6px}
.pw-toggle:hover{color:var(--ink)}
.f-btn{font-family:var(--font-sans);font-weight:600;font-size:14px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;padding:13px 16px;white-space:nowrap;transition:transform 120ms var(--ease-out);width:100%}
.f-btn:active{transform:scale(0.97)}
.f-btn--amber{background:var(--amber);color:var(--amber-fg)}
.form-links{margin-top:20px;font-size:13px;color:var(--ink-soft);text-align:center}
.form-links a{color:var(--ink);font-weight:600;text-decoration:none}
.form-error{background:rgba(52,30,28,0.08);border:1px solid rgba(214,93,74,0.3);color:#a83226;border-radius:8px;padding:11px 13px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <a href="/" class="logo">
    <span class="logo-mark">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg>
    </span>
    Folio
  </a>
  <h1 class="card-title">Set a new password</h1>
  <p class="card-sub">Choose a strong password for your Folio account.</p>

  {% if error %}
  <div class="form-error">{{ error }}</div>
  {% endif %}

  <form action="/auth/reset-password" method="POST">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="f-field">
      <label class="f-label" for="password">New password</label>
      <div class="pw-wrap">
        <input class="f-input" type="password" id="password" name="password" placeholder="At least 8 characters" required autocomplete="new-password">
        <button type="button" class="pw-toggle" onclick="togglePw()" aria-label="Toggle password">
          <svg id="pw-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="f-btn f-btn--amber">Reset password</button>
  </form>

  <div class="form-links">
    <a href="/login">← Back to sign in</a>
  </div>
</div>
<script>
function togglePw() {
  const input = document.getElementById('password');
  const eye = document.getElementById('pw-eye');
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  eye.innerHTML = show
    ? '<path d="M10.7 5.1A9 9 0 0 1 12 5c6.5 0 10 7 10 7a13 13 0 0 1-2.2 2.9M6.6 6.6A13 13 0 0 0 2 12s3.5 7 10 7a9 9 0 0 0 4-.9"/><path d="m3 3 18 18"/><path d="M9.5 9.5a3 3 0 0 0 4.2 4.2"/>'
    : '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
}
</script>
</body>
</html>
