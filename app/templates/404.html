<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 · Morus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink-blue:#243B6B;--paper:#F4EEE2;--ink:#1A1714;--ink-soft:#4A443B;--amber:#E0A23E;--amber-fg:#231A0E;--font-sans:'Inter Tight',-apple-system,system-ui,sans-serif;--font-mono:'JetBrains Mono',monospace;--ease-out:cubic-bezier(0.2,0,0,1)}
*{box-sizing:border-box}html,body{margin:0;padding:0;font-family:var(--font-sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.berry{color:var(--ink-blue);margin-bottom:22px}
.big{font-weight:500;letter-spacing:-0.05em;font-variant-numeric:tabular-nums;line-height:0.85;font-size:96px;color:var(--ink-blue)}
p{font-size:16px;color:var(--ink-soft);line-height:1.5;margin:14px 0 26px;max-width:360px}
.f-btn{font-family:var(--font-sans);font-weight:600;font-size:13px;letter-spacing:-0.01em;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:7px;padding:12px 20px;white-space:nowrap;text-decoration:none;background:var(--amber);color:var(--amber-fg)}
</style>
</head>
<body>
<div class="page">
  <div class="berry">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.55" stroke-linecap="round" stroke-linejoin="round">
      <g fill="currentColor" stroke="none"><circle cx="10.7" cy="9.4" r="1.5"/><circle cx="13.3" cy="9.4" r="1.5"/><circle cx="9.5" cy="11.7" r="1.5"/><circle cx="12" cy="11.7" r="1.5"/><circle cx="14.5" cy="11.7" r="1.5"/><circle cx="9.6" cy="14" r="1.5"/><circle cx="12" cy="14" r="1.5"/><circle cx="14.4" cy="14" r="1.5"/><circle cx="10.4" cy="16.2" r="1.5"/><circle cx="13.6" cy="16.2" r="1.5"/><circle cx="12" cy="18.2" r="1.5"/></g>
      <path d="M12 7.6 9.9 4.8" stroke-width="1.5"/><path d="M12 7.6V4.1" stroke-width="1.5"/><path d="m12 7.6 2.1-2.8" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="big">404</div>
  <p>This page doesn't exist. It may have moved, or the link is wrong.</p>
  <a href="/" class="f-btn">Back home</a>
</div>
</body>
</html>
