<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Open Bookie</title>
    <style>
        body {
            font-family: sans-serif;
            line-height: 1.5;
            margin: 2rem;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            border: 1px solid #ccc;
            padding: 2rem;
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            cursor: pointer;
            background: #eee;
            border: 1px solid #ccc;
            font-weight: bold;
        }

        button:hover {
            background: #ddd;
        }

        .error {
            color: #721c24;
            background: #f8d7da;
            padding: 0.75rem;
            border: 1px solid #f5c6cb;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        .success {
            color: #155724;
            background: #d4edda;
            padding: 0.75rem;
            border: 1px solid #c3e6cb;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        .links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Reset Password</h1>
        <p>Enter your email to receive a reset link</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
        <div class="success">A reset link has been sent to your email.</div>
        {% else %}
        <form action="/auth/password-recovery" method="POST">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <button type="submit">Send reset link</button>
        </form>
        {% endif %}

        <div class="links">
            <p><a href="/login">Back to login</a></p>
        </div>
    </div>
</body>

</html>
