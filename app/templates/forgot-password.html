<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Folio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #18181b;
            --text-secondary: #71717a;
            --border-color: #e4e4e7;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: 10vh;
        }

        * {
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        h1 {
            margin: 0 0 8px;
            font-weight: 700;
            font-size: 2rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            margin: 0 0 32px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            background: #fafafa;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--text-primary);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--text-primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 1.05rem;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .error {
            color: #b91c1c;
            background: #fef2f2;
            padding: 12px;
            border: 1px solid #fee2e2;
            margin-bottom: 24px;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .links {
            margin-top: 32px;
            font-size: 0.95rem;
            text-align: center;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .links a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Forgot Password</h1>
        <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form action="/auth/forgot-password" method="POST">
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>

        <div class="links">
            <div>Remembered your password? <a href="/login">Log in</a></div>
        </div>
    </div>
</body>

</html>
